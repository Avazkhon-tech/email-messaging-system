services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-emaildb}
      POSTGRES_USER: ${DB_USERNAME:-emailuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-emailpass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-emailuser} -d ${DB_NAME:-emaildb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-emaildb}
      DB_USERNAME: ${DB_USERNAME:-emailuser}
      DB_PASSWORD: ${DB_PASSWORD:-emailpass}
      JWT_SECRET: ${JWT_SECRET:-Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQtMzJC}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CREDENTIAL_AES_KEY: ${CREDENTIAL_AES_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      SYNC_INTERVAL_MS: ${SYNC_INTERVAL_MS:-60000}
      SYNC_INITIAL_DELAY_MS: ${SYNC_INITIAL_DELAY_MS:-15000}
      SYNC_FETCH_LIMIT: ${SYNC_FETCH_LIMIT:-50}
      MAIL_TIMEOUT_MS: ${MAIL_TIMEOUT_MS:-30000}

      # ---- Gmail Watch API (OAuth2 + Pub/Sub) ----
      GOOGLE_ENABLED: ${GOOGLE_ENABLED:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/oauth/google/callback}
      GOOGLE_SUCCESS_REDIRECT: ${GOOGLE_SUCCESS_REDIRECT:-/accounts.html}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GMAIL_PUBSUB_TOPIC: ${GMAIL_PUBSUB_TOPIC:-gmail-push}
      GMAIL_PUBSUB_SUBSCRIPTION: ${GMAIL_PUBSUB_SUBSCRIPTION:-gmail-push-sub}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/pubsub-sa.json

      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
    volumes:
      # Mount the secrets directory read-only. Place pubsub-sa.json here to enable Gmail.
      - ./secrets:/secrets:ro
    ports:
      - "8080:8080"

volumes:
  pgdata:
