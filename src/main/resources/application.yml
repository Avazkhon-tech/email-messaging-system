spring:
  application:
    name: email-messaging-system

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/emaildb}
    username: ${DB_USERNAME:emailuser}
    password: ${DB_PASSWORD:emailpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:

    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQtMzJC}

    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  crypto:

    secret: ${CREDENTIAL_AES_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  sync:

    interval-ms: ${SYNC_INTERVAL_MS:60000}

    initial-delay-ms: ${SYNC_INITIAL_DELAY_MS:15000}

    fetch-limit: ${SYNC_FETCH_LIMIT:50}
  mail:

    timeout-ms: ${MAIL_TIMEOUT_MS:30000}
  cache:

    maximum-size: ${CACHE_MAX_SIZE:10000}

    expire-after-write-seconds: ${CACHE_TTL_SECONDS:300}
  google:

    enabled: ${GOOGLE_ENABLED:false}

    client-id: ${GOOGLE_CLIENT_ID:}

    client-secret: ${GOOGLE_CLIENT_SECRET:}

    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/oauth/google/callback}

    success-redirect: ${GOOGLE_SUCCESS_REDIRECT:/accounts.html}

    project-id: ${GCP_PROJECT_ID:}

    pubsub-topic: ${GMAIL_PUBSUB_TOPIC:gmail-push}

    pubsub-subscription: ${GMAIL_PUBSUB_SUBSCRIPTION:gmail-push-sub}

logging:
  level:
    com.emailsystem: INFO

kind: Application
