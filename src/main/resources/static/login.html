<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — Email Messaging System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header><h1>Email Messaging System</h1></header>
<div class="container" style="max-width: 420px;">
    <div class="card">
        <h2 id="formTitle">Login</h2>
        <div id="error" class="error"></div>

        <div id="nameField" style="display:none;">
            <label>Full name</label>
            <input id="fullname" type="text" placeholder="Jane Doe">
        </div>
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••">

        <button id="submitBtn" style="width:100%; margin-top:12px;">Login</button>
        <p class="muted" style="margin-top:12px;">
            <span id="toggleText">No account?</span>
            <a href="#" id="toggleLink">Register</a>
        </p>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    let mode = 'login';
    const $ = (id) => document.getElementById(id);

    $('toggleLink').onclick = (e) => {
        e.preventDefault();
        mode = mode === 'login' ? 'register' : 'login';
        const isRegister = mode === 'register';
        $('formTitle').textContent = isRegister ? 'Register' : 'Login';
        $('submitBtn').textContent = isRegister ? 'Register' : 'Login';
        $('nameField').style.display = isRegister ? 'block' : 'none';
        $('toggleText').textContent = isRegister ? 'Have an account?' : 'No account?';
        $('toggleLink').textContent = isRegister ? 'Login' : 'Register';
        $('error').textContent = '';
    };

    $('submitBtn').onclick = async () => {
        $('error').textContent = '';
        const body = { email: $('email').value.trim(), password: $('password').value };
        try {
            let auth;
            if (mode === 'register') {
                body.fullname = $('fullname').value.trim();
                auth = await Api.post('/api/auth/register', body);
            } else {
                auth = await Api.post('/api/auth/login', body);
            }
            Api.setSession(auth);
            window.location.replace('/inbox.html');
        } catch (err) {
            $('error').textContent = err.message;
        }
    };
</script>
</body>
</html>
